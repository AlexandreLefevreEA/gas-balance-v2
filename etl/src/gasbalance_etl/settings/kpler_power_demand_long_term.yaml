# Kpler long-term power demand — one zone per balance area (covariate, MW).
# Each entry maps a balance `area` to the Kpler `zone` we pull the forward hourly demand
# climatology for. Today the map is identity (area code == zone code); it's explicit so a
# split country (e.g. IT bidding zones) can be remapped without touching code.
# This endpoint's `zones` is the country-code enum (Germany is DE, not DE-LU — verified live).
# The 11 model series per zone (MEAN + last-10 REF) are generated in
# `connector.series_dict()` — codes `KP.LOADLT.<zone>.<MODEL>`.
