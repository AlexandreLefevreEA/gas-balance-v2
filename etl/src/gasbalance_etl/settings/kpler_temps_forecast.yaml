# Kpler temperature forecasts — one zone per balance area (forecast covariate, °C).
# Each entry maps a balance `area` to the Kpler `zone` we pull 00z forecast runs for.
# Today the map is identity (area code == zone code); it's explicit so a split country
# (e.g. IT bidding zones) can be remapped without touching code.
# The 2 model series per zone (EC_AIFS_ENS + EC_46) are generated in
# `connector.series_dict()` — codes `KP.TEMPFC.<zone>.<MODEL>`.
