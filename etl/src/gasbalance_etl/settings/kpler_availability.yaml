# Kpler plant availability — 4 fuel series per balance area (actual, covariate, MW).
# Each entry maps a balance `area` to the Kpler `zone` we pull daily availability for.
# The `power/outages/availability/fuel-types` endpoint takes plain **country codes** (Germany
# is `DE`, NOT the `DE-LU` bidding zone the generation-forecast endpoint needs) — so the map is
# identity. It's explicit so a split country could be remapped without touching code.
# The 4 fuel series per zone (COAL + GAS + LIGNITE + NUCLEAR) are generated in
# `connector.series_dict()` — codes `KP.AVAIL.<FUEL>.<zone>`. Combos a country has no fleet for
# (e.g. AT nuclear) simply carry a constant 0 from the feed; harmless.
- {area: AT, zone: AT}
- {area: BE, zone: BE}
- {area: BG, zone: BG}
- {area: CZ, zone: CZ}
- {area: DE, zone: DE}
- {area: DK, zone: DK}
- {area: FR, zone: FR}
