# Kpler long-term temperatures — one zone per balance area (covariate, °C).
# Each entry maps a balance `area` to the Kpler `zone` we pull the forward hourly
# climatology for. Today the map is identity (area code == zone code); it's explicit so a
# split country (e.g. IT bidding zones) can be remapped without touching code.
# The 11 model series per zone (MEAN + last-10 REF) are generated in
# `connector.series_dict()` — codes `KP.TEMPLT.<zone>.<MODEL>`.
- {area: AT, zone: AT}
- {area: BE, zone: BE}
- {area: BG, zone: BG}
- {area: CZ, zone: CZ}
- {area: DE, zone: DE}
- {area: DK, zone: DK}
