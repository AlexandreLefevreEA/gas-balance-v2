# Kpler actual power demand — one demand series per balance area (covariate, MW).
# Each entry maps a balance `area` to the Kpler `zone` we pull hourly load for.
# Today the map is identity (area code == zone code); it's explicit so a split country
# (e.g. IT bidding zones) can be remapped without touching code.
# One series per zone (code KP.LOAD.<zone>) is generated in `connector.series_dict()`.
# All 18 zones return data (most from ~2016, FR from 2014).
