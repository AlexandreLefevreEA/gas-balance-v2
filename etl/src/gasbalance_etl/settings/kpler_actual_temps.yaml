# Kpler actual temperatures — one series per balance area (covariate, °C).
# Each entry maps a balance `area` to the Kpler `zone` we pull hourly D-0/00z/EC_OP
# temps for. Today the map is identity (area code == zone code); it's explicit so a
# split country (e.g. IT bidding zones) can be remapped without touching code.
#   code   Series.code (unique).   group -> Series.category.   zone -> Kpler zone param.
- {code: KP.TEMP.AT, name: AT Temperature, group: temperature, area: AT, zone: AT, unit: degC}
